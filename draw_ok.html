<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>画图 - Windows 11 Web Edition (经典不透明版)</title>
<style>
    :root {
        --mica-bg: #f3f3f3;
        --card-bg: rgba(255, 255, 255, 0.85);
        --border-color: rgba(0, 0, 0, 0.08);
        --text-main: #1a1a1a;
        --text-sub: #606060;
        --accent: #0067c0;
        --accent-hover: #005da6;
        --hover-bg: rgba(0, 0, 0, 0.04);
        --active-bg: rgba(0, 0, 0, 0.08);
        --shadow: 0 2px 8px rgba(0,0,0,0.08);
        --radius: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
    body {
        font-family: 'Segoe UI Variable', 'Segoe UI', system-ui, sans-serif;
        background: var(--mica-bg);
        color: var(--text-main);
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        font-size: 13px;
    }

    .title-bar { height: 32px; display: flex; align-items: center; padding: 0 12px; font-size: 12px; color: var(--text-sub); }

    .toolbar {
        background: var(--card-bg); backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--border-color); padding: 8px 16px;
        display: flex; gap: 16px; align-items: flex-start; box-shadow: var(--shadow); z-index: 100;
    }
    .tool-group { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 0 8px; border-right: 1px solid var(--border-color); }
    .tool-group:last-child { border-right: none; }
    .tool-group-label { font-size: 11px; color: var(--text-sub); margin-top: 4px; }
    .tool-row { display: flex; gap: 4px; align-items: center; }

    .btn {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        padding: 6px 10px; border: 1px solid transparent; border-radius: 6px;
        background: transparent; cursor: pointer; color: var(--text-main);
        transition: all 0.1s; min-width: 50px; height: 54px;
    }
    .btn:hover { background: var(--hover-bg); border-color: var(--border-color); }
    .btn:active { background: var(--active-bg); }
    .btn.active { background: rgba(0, 103, 192, 0.1); border-color: var(--accent); color: var(--accent); }
    .btn-icon { font-size: 20px; margin-bottom: 2px; }
    .btn-text { font-size: 11px; }
    
    .btn-small { padding: 4px 8px; height: 32px; min-width: 32px; flex-direction: row; gap: 4px; }
    .btn-small .btn-icon { font-size: 16px; margin: 0; }

    .color-palette { display: flex; flex-wrap: wrap; width: 160px; gap: 2px; }
    .color-swatch { width: 16px; height: 16px; border: 1px solid rgba(0,0,0,0.1); border-radius: 3px; cursor: pointer; transition: transform 0.1s; }
    .color-swatch:hover { transform: scale(1.2); z-index: 10; box-shadow: 0 0 3px rgba(0,0,0,0.3); }
    .current-colors { display: flex; gap: 8px; align-items: center; margin-bottom: 4px; position: relative; width: 40px; height: 40px;}
    .color-box { width: 24px; height: 24px; border: 2px solid #fff; box-shadow: 0 0 0 1px rgba(0,0,0,0.2); border-radius: 4px; cursor: pointer; position: absolute; }
    .color-box input { opacity: 0; position: absolute; width: 100%; height: 100%; cursor: pointer; }
    #fgColorBox { top: 0; left: 0; z-index: 2; }
    #bgColorBox { bottom: 0; right: 0; z-index: 1; }

    .tabs-bar { height: 36px; background: #e9e9e9; display: flex; align-items: flex-end; padding: 0 8px; border-bottom: 1px solid var(--border-color); overflow-x: auto; }
    .tab {
        height: 28px; padding: 0 16px; background: #e0e0e0; border: 1px solid #ccc;
        border-bottom: none; border-radius: 6px 6px 0 0; margin-right: 2px;
        display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 12px;
        max-width: 180px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .tab.active { background: #fff; border-color: var(--border-color); font-weight: 600; margin-bottom: -1px; padding-bottom: 2px;}
    .tab-close { font-size: 14px; opacity: 0.5; padding: 2px; border-radius: 50%; }
    .tab-close:hover { background: rgba(0,0,0,0.1); opacity: 1; }
    .tab-add { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; border-radius: 4px;}
    .tab-add:hover { background: rgba(0,0,0,0.05); }

    .workspace { flex: 1; display: flex; overflow: hidden; background: #d1d1d1; position: relative; }
    .canvas-viewport { flex: 1; overflow: auto; display: flex; justify-content: center; align-items: center; padding: 40px; position: relative; }
    
    /* 画布容器：纯白背景，无透明棋盘格 */
    .canvas-wrapper { position: relative; box-shadow: 0 4px 20px rgba(0,0,0,0.15); background: #ffffff; }
    
    canvas { position: absolute; top: 0; left: 0; image-rendering: pixelated; }
    #mainCanvas { z-index: 1; }
    #interactionCanvas { z-index: 2; }
    #selectionCanvas { z-index: 3; pointer-events: none; }

    .status-bar { height: 28px; background: var(--card-bg); border-top: 1px solid var(--border-color); display: flex; align-items: center; padding: 0 16px; font-size: 12px; color: var(--text-sub); gap: 20px; }
    .status-bar .spacer { flex: 1; }
    .zoom-control { display: flex; align-items: center; gap: 8px; }
    .zoom-control input { width: 80px; }

    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.3); backdrop-filter: blur(4px); display: none; justify-content: center; align-items: center; z-index: 1000; }
    .modal-overlay.show { display: flex; }
    .modal { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); min-width: 300px;}
    .modal h3 { margin-bottom: 16px; font-size: 16px; }
    .modal-row { margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .modal-row label { width: 60px; font-size: 13px; }
    .modal-row input[type="number"] { flex: 1; padding: 6px; border: 1px solid #ccc; border-radius: 4px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
    .btn-primary { background: var(--accent); color: #fff; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
    .btn-secondary { background: #e1e1e1; color: #000; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }

    #textInput {
        position: absolute; z-index: 10; border: 2px dashed var(--accent);
        background: rgba(255,255,255,0.9); padding: 4px; outline: none;
        display: none; min-width: 50px; min-height: 24px; resize: both; font-family: sans-serif;
    }

    select { padding: 4px; border-radius: 4px; border: 1px solid #ccc; font-size: 12px; }
</style>
</head>
<body>

<div class="title-bar"><span>🎨 画图 - Windows 11 Web Edition</span></div>

<div class="toolbar">
    <div class="tool-group">
        <div class="tool-row">
            <button class="btn btn-small" onclick="app.newDoc()" title="新建"><span class="btn-icon">📄</span></button>
            <button class="btn btn-small" onclick="document.getElementById('fileInput').click()" title="打开"><span class="btn-icon">📂</span></button>
            <button class="btn btn-small" onclick="app.saveDoc()" title="保存"><span class="btn-icon">💾</span></button>
        </div>
        <span class="tool-group-label">文件</span>
    </div>

    <div class="tool-group">
        <div class="tool-row">
            <button class="btn btn-small" onclick="app.undo()" title="撤销 (Ctrl+Z)"><span class="btn-icon">↩️</span></button>
            <button class="btn btn-small" onclick="app.redo()" title="重做 (Ctrl+Y)"><span class="btn-icon">↪️</span></button>
            <button class="btn btn-small" onclick="app.cropToSelection()" title="裁剪"><span class="btn-icon">✂️</span></button>
            <button class="btn btn-small" onclick="app.showResizeModal()" title="调整大小"><span class="btn-icon">↔️</span></button>
            <button class="btn btn-small" onclick="app.rotate(90)" title="右旋90°"><span class="btn-icon">🔄</span></button>
        </div>
        <span class="tool-group-label">图像</span>
    </div>

    <div class="tool-group">
        <div class="tool-row">
            <button class="btn active" data-tool="pencil" onclick="app.setTool('pencil')"><span class="btn-icon">✏️</span><span class="btn-text">铅笔</span></button>
            <button class="btn" data-tool="brush" onclick="app.setTool('brush')"><span class="btn-icon">🖌️</span><span class="btn-text">刷子</span></button>
            <button class="btn" data-tool="eraser" onclick="app.setTool('eraser')"><span class="btn-icon">🧽</span><span class="btn-text">橡皮</span></button>
            <button class="btn" data-tool="bucket" onclick="app.setTool('bucket')"><span class="btn-icon">🪣</span><span class="btn-text">填充</span></button>
            <button class="btn" data-tool="picker" onclick="app.setTool('picker')"><span class="btn-icon">💧</span><span class="btn-text">取色</span></button>
            <button class="btn" data-tool="text" onclick="app.setTool('text')"><span class="btn-icon">🔤</span><span class="btn-text">文本</span></button>
            <button class="btn" data-tool="select" onclick="app.setTool('select')"><span class="btn-icon">⬚</span><span class="btn-text">选择</span></button>
        </div>
        <span class="tool-group-label">工具</span>
    </div>

    <div class="tool-group">
        <div class="tool-row">
            <button class="btn" data-tool="line" onclick="app.setTool('line')"><span class="btn-icon">📏</span><span class="btn-text">直线</span></button>
            <button class="btn" data-tool="rect" onclick="app.setTool('rect')"><span class="btn-icon">⬜</span><span class="btn-text">矩形</span></button>
            <button class="btn" data-tool="ellipse" onclick="app.setTool('ellipse')"><span class="btn-icon">⭕</span><span class="btn-text">椭圆</span></button>
        </div>
        <div class="tool-row" style="gap: 8px;">
            <select id="strokeStyle" onchange="app.updateShapeOptions()"><option value="solid">实线</option><option value="dashed">虚线</option><option value="none">无轮廓</option></select>
            <select id="fillStyle" onchange="app.updateShapeOptions()"><option value="none">无填充</option><option value="solid">纯色填充</option></select>
        </div>
        <span class="tool-group-label">形状</span>
    </div>

    <div class="tool-group">
        <div class="tool-row" style="flex-direction: column; align-items: flex-start; gap: 6px;">
            <label style="font-size:11px;">画笔: <span id="sizeVal">3</span>px</label>
            <input type="range" id="lineWidth" min="1" max="50" value="3" style="width:100px" oninput="app.setLineWidth(this.value)">
            <label style="font-size:11px;">字号: <span id="fontVal">16</span>px</label>
            <input type="range" id="fontSize" min="8" max="100" value="16" style="width:100px" oninput="app.setFontSize(this.value)">
        </div>
        <span class="tool-group-label">大小</span>
    </div>

    <div class="tool-group">
        <div class="current-colors">
            <div class="color-box" id="fgColorBox" style="background: #000000;">
                <input type="color" id="fgColor" value="#000000" onchange="app.setFgColor(this.value)">
            </div>
            <div class="color-box" id="bgColorBox" style="background: #ffffff;">
                <input type="color" id="bgColor" value="#ffffff" onchange="app.setBgColor(this.value)">
            </div>
        </div>
        <div class="color-palette" id="palette"></div>
        <span class="tool-group-label">颜色</span>
    </div>
</div>

<input type="file" id="fileInput" accept="image/*" style="display:none" onchange="app.openImage(event)">

<div class="tabs-bar" id="tabsBar">
    <div class="tab-add" onclick="app.newDoc()" title="新建图像">➕</div>
</div>

<div class="workspace">
    <div class="canvas-viewport" id="viewport">
        <div class="canvas-wrapper" id="canvasWrapper">
            <canvas id="mainCanvas"></canvas>
            <canvas id="interactionCanvas"></canvas>
            <canvas id="selectionCanvas"></canvas>
            <textarea id="textInput"></textarea>
        </div>
    </div>
</div>

<div class="status-bar">
    <span id="statusCoords">0, 0 px</span>
    <span id="statusSize">800 x 600 px</span>
    <div class="spacer"></div>
    <div class="zoom-control">
        <button class="btn btn-small" onclick="app.zoomOut()" style="height:20px; min-width:20px; padding:0;">➖</button>
        <input type="range" id="zoomSlider" min="10" max="800" value="100" oninput="app.setZoom(this.value)">
        <button class="btn btn-small" onclick="app.zoomIn()" style="height:20px; min-width:20px; padding:0;">➕</button>
        <span id="zoomVal">100%</span>
    </div>
</div>

<div class="modal-overlay" id="resizeModal">
    <div class="modal">
        <h3>调整大小</h3>
        <div class="modal-row"><label>宽度:</label><input type="number" id="resizeW" value="800"> px</div>
        <div class="modal-row"><label>高度:</label><input type="number" id="resizeH" value="600"> px</div>
        <div class="modal-row"><label><input type="checkbox" id="keepRatio" checked> 保持比例</label></div>
        <div class="modal-actions">
            <button class="btn-secondary" onclick="app.hideModal('resizeModal')">取消</button>
            <button class="btn-primary" onclick="app.applyResize()">确定</button>
        </div>
    </div>
</div>

<script>
class Document {
    constructor(id, name, width, height, img = null) {
        this.id = id;
        this.name = name;
        this.width = width;
        this.height = height;
        
        this.canvas = document.createElement('canvas');
        this.canvas.width = width;
        this.canvas.height = height;
        this.ctx = this.canvas.getContext('2d');
        
        if (img) {
            this.ctx.drawImage(img, 0, 0);
        } else {
            // 默认背景填充为白色（不透明）
            this.ctx.fillStyle = '#ffffff';
            this.ctx.fillRect(0, 0, width, height);
        }

        this.history = [];
        this.historyIndex = -1;
        this.saveState();
    }

    saveState() {
        this.history = this.history.slice(0, this.historyIndex + 1);
        this.history.push(this.canvas.toDataURL());
        if (this.history.length > 30) this.history.shift(); 
        this.historyIndex = this.history.length - 1;
    }

    undo() {
        if (this.historyIndex <= 0) return false;
        this.historyIndex--;
        this.restoreState(this.history[this.historyIndex]);
        return true;
    }

    redo() {
        if (this.historyIndex >= this.history.length - 1) return false;
        this.historyIndex++;
        this.restoreState(this.history[this.historyIndex]);
        return true;
    }

    restoreState(dataUrl) {
        const img = new Image();
        img.onload = () => {
            this.canvas.width = img.width;
            this.canvas.height = img.height;
            this.width = img.width;
            this.height = img.height;
            this.ctx.drawImage(img, 0, 0);
            if (window.app && window.app.activeDoc === this) {
                window.app.syncCanvasSize();
                window.app.render();
            }
        };
        img.src = dataUrl;
    }
}

class PaintApp {
    constructor() {
        this.docs = [];
        this.activeDoc = null;
        
        this.tool = 'pencil';
        this.fgColor = '#000000';
        this.bgColor = '#ffffff'; // 背景色，用于橡皮擦和删除
        this.lineWidth = 3;
        this.fontSize = 16;
        this.zoom = 1;
        this.shapeOptions = { stroke: 'solid', fill: 'none' };

        this.isDrawing = false;
        this.startX = 0; this.startY = 0;
        
        this.selection = null; 
        this.floatingSelection = null; 
        this.isDraggingSelection = false;
        this.dragOffsetX = 0; this.dragOffsetY = 0;

        this.mainCanvas = document.getElementById('mainCanvas');
        this.mainCtx = this.mainCanvas.getContext('2d');
        this.interactionCanvas = document.getElementById('interactionCanvas');
        this.interactionCtx = this.interactionCanvas.getContext('2d');
        this.selectionCanvas = document.getElementById('selectionCanvas');
        this.selectionCtx = this.selectionCanvas.getContext('2d');
        
        this.wrapper = document.getElementById('canvasWrapper');
        this.textInput = document.getElementById('textInput');

        this.init();
    }

    init() {
        this.setupPalette();
        this.bindEvents();
        this.newDoc(); 
    }

    setupPalette() {
        const colors = [
            '#000000', '#7f7f7f', '#880015', '#ed1c24', '#ff7f27', '#fff200', '#22b14c', '#00a2e8', '#3f48cc', '#a349a4',
            '#ffffff', '#c3c3c3', '#b97a57', '#ffaec9', '#ffc90e', '#efe4b0', '#b5e61d', '#99d9ea', '#7092be', '#c8bfe7'
        ];
        const palette = document.getElementById('palette');
        colors.forEach(c => {
            const div = document.createElement('div');
            div.className = 'color-swatch';
            div.style.background = c;
            div.onclick = () => this.setFgColor(c);
            div.oncontextmenu = (e) => { e.preventDefault(); this.setBgColor(c); };
            palette.appendChild(div);
        });
    }

    bindEvents() {
        this.interactionCanvas.addEventListener('pointerdown', (e) => this.onPointerDown(e));
        this.interactionCanvas.addEventListener('pointermove', (e) => this.onPointerMove(e));
        this.interactionCanvas.addEventListener('pointerup', (e) => this.onPointerUp(e));
        this.interactionCanvas.addEventListener('pointerleave', (e) => { if(this.isDrawing) this.onPointerUp(e); });

        this.textInput.addEventListener('blur', () => this.commitText());
        this.textInput.addEventListener('keydown', (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); this.commitText(); }});

        window.addEventListener('keydown', (e) => {
            // 如果焦点在文本框内，不触发全局快捷键
            if (document.activeElement === this.textInput) return;

            if(e.ctrlKey && e.key === 'z') { e.preventDefault(); this.undo(); }
            if(e.ctrlKey && e.key === 'y') { e.preventDefault(); this.redo(); }
            if(e.ctrlKey && e.key === 's') { e.preventDefault(); this.saveDoc(); }
            if(e.ctrlKey && e.key === 'c') { e.preventDefault(); this.copySelection(); }
            if(e.ctrlKey && e.key === 'v') { e.preventDefault(); this.pasteClipboard(); }
            if(e.key === 'Delete' && this.selection && !this.floatingSelection) { e.preventDefault(); this.deleteSelection(); }
        });
    }

    // --- Document Management ---
    newDoc(img = null, name = "未命名") {
        if (this.floatingSelection) this.commitFloatingSelection();
        const id = Date.now() + Math.random();
        const w = img ? img.width : 800;
        const h = img ? img.height : 600;
        const doc = new Document(id, name, w, h, img);
        this.docs.push(doc);
        this.switchDoc(id);
        this.renderTabs();
    }

    openImage(e) {
        const file = e.target.files[0];
        if (!file) return;
        const img = new Image();
        img.onload = () => this.newDoc(img, file.name);
        img.src = URL.createObjectURL(file);
        e.target.value = '';
    }

    closeDoc(id, e) {
        if(e) e.stopPropagation();
        if(this.docs.length <= 1) return alert("至少保留一个文档！");
        const idx = this.docs.findIndex(d => d.id === id);
        this.docs.splice(idx, 1);
        if(this.activeDoc.id === id) {
            const newIdx = Math.max(0, idx - 1);
            this.switchDoc(this.docs[newIdx].id);
        }
        this.renderTabs();
    }

    switchDoc(id) {
        if (this.floatingSelection) this.commitFloatingSelection();
        this.selection = null;
        this.clearSelectionCanvas();

        this.activeDoc = this.docs.find(d => d.id === id);
        this.syncCanvasSize();
        this.render();
        this.renderTabs();
    }

    renderTabs() {
        const bar = document.getElementById('tabsBar');
        const addBtn = bar.querySelector('.tab-add');
        bar.innerHTML = '';
        
        this.docs.forEach(doc => {
            const tab = document.createElement('div');
            tab.className = 'tab' + (doc === this.activeDoc ? ' active' : '');
            tab.innerHTML = `<span style="overflow:hidden; text-overflow:ellipsis;">${doc.name}</span><span class="tab-close" onclick="app.closeDoc(${doc.id}, event)">×</span>`;
            tab.onclick = () => this.switchDoc(doc.id);
            bar.appendChild(tab);
        });
        bar.appendChild(addBtn);
    }

    saveDoc() {
        if(!this.activeDoc) return;
        const link = document.createElement('a');
        link.download = this.activeDoc.name + '.png';
        link.href = this.activeDoc.canvas.toDataURL('image/png');
        link.click();
    }

    syncCanvasSize() {
        if(!this.activeDoc) return;
        const w = this.activeDoc.width;
        const h = this.activeDoc.height;
        [this.mainCanvas, this.interactionCanvas, this.selectionCanvas].forEach(c => {
            c.width = w; c.height = h;
            c.style.width = (w * this.zoom) + 'px';
            c.style.height = (h * this.zoom) + 'px';
        });
        this.wrapper.style.width = (w * this.zoom) + 'px';
        this.wrapper.style.height = (h * this.zoom) + 'px';
        document.getElementById('statusSize').textContent = `${w} x ${h} px`;
    }

    render() {
        if(!this.activeDoc) return;
        this.mainCtx.clearRect(0, 0, this.activeDoc.width, this.activeDoc.height);
        this.mainCtx.drawImage(this.activeDoc.canvas, 0, 0);
        
        if (this.floatingSelection) {
            this.mainCtx.putImageData(this.floatingSelection.imgData, this.floatingSelection.x, this.floatingSelection.y);
        }
    }

    getPos(e) {
        const rect = this.interactionCanvas.getBoundingClientRect();
        return {
            x: Math.floor((e.clientX - rect.left) / this.zoom),
            y: Math.floor((e.clientY - rect.top) / this.zoom)
        };
    }

    onPointerDown(e) {
        if(!this.activeDoc) return;
        const pos = this.getPos(e);
        this.startX = pos.x; this.startY = pos.y;

        // 检查是否点击了现有选区内部以进行拖拽
        if (this.tool === 'select' && this.selection && !this.floatingSelection) {
            const s = this.selection;
            if (pos.x >= s.x && pos.x <= s.x + s.w && pos.y >= s.y && pos.y <= s.y + s.h) {
                this.isDraggingSelection = true;
                this.isDrawing = true;
                
                const ctx = this.activeDoc.ctx;
                const sx = Math.max(0, s.x), sy = Math.max(0, s.y);
                const sw = Math.min(s.w, this.activeDoc.width - sx);
                const sh = Math.min(s.h, this.activeDoc.height - sy);
                
                const imgData = ctx.getImageData(sx, sy, sw, sh);
                this.floatingSelection = { imgData, x: sx, y: sy, w: sw, h: sh };
                this.dragOffsetX = pos.x - sx;
                this.dragOffsetY = pos.y - sy;
                
                // 原位置用背景色覆盖（不透明逻辑）
                ctx.fillStyle = this.bgColor;
                ctx.fillRect(sx, sy, sw, sh);
                
                this.clearSelectionCanvas();
                this.render();
                return;
            }
        }

        this.isDrawing = true;
        const ctx = this.interactionCtx;
        ctx.clearRect(0, 0, this.activeDoc.width, this.activeDoc.height);
        ctx.globalCompositeOperation = 'source-over'; // 确保正常覆盖模式

        if (this.tool === 'pencil' || this.tool === 'brush') {
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            ctx.lineTo(pos.x + 0.1, pos.y + 0.1);
            ctx.strokeStyle = this.fgColor;
            ctx.lineWidth = this.tool === 'brush' ? this.lineWidth * 2 : this.lineWidth;
            ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            ctx.stroke();
        } else if (this.tool === 'eraser') {
            // 【修复】橡皮擦：直接使用背景色绘制，不使用透明擦除
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            ctx.lineTo(pos.x + 0.1, pos.y + 0.1);
            ctx.strokeStyle = this.bgColor; 
            ctx.lineWidth = this.lineWidth * 3;
            ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            ctx.stroke();
        } else if (this.tool === 'bucket') {
            this.floodFill(this.activeDoc.ctx, pos.x, pos.y, this.fgColor);
            this.render();
            this.activeDoc.saveState();
            this.isDrawing = false;
        } else if (this.tool === 'picker') {
            this.pickColor(pos.x, pos.y);
            this.isDrawing = false;
        } else if (this.tool === 'text') {
            this.showTextInput(pos.x, pos.y);
            this.isDrawing = false;
        } else if (this.tool === 'select') {
            this.selection = null;
            this.floatingSelection = null;
            this.clearSelectionCanvas();
        }
    }

    onPointerMove(e) {
        if(!this.activeDoc) return;
        const pos = this.getPos(e);
        document.getElementById('statusCoords').textContent = `${pos.x}, ${pos.y} px`;

        if (this.tool === 'select' && this.selection && !this.floatingSelection && !this.isDrawing) {
            const s = this.selection;
            if (pos.x >= s.x && pos.x <= s.x + s.w && pos.y >= s.y && pos.y <= s.y + s.h) {
                this.interactionCanvas.style.cursor = 'move';
            } else {
                this.interactionCanvas.style.cursor = 'crosshair';
            }
        }

        if (!this.isDrawing) return;

        if (this.isDraggingSelection && this.floatingSelection) {
            this.floatingSelection.x = pos.x - this.dragOffsetX;
            this.floatingSelection.y = pos.y - this.dragOffsetY;
            this.render();
            return;
        }

        const ctx = this.interactionCtx;

        if (this.tool === 'pencil' || this.tool === 'brush' || this.tool === 'eraser') {
            ctx.beginPath();
            ctx.moveTo(this.startX, this.startY);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            this.startX = pos.x; this.startY = pos.y; // 更新起点
        } else if (this.tool === 'line' || this.tool === 'rect' || this.tool === 'ellipse') {
            ctx.clearRect(0, 0, this.activeDoc.width, this.activeDoc.height);
            this.drawShape(ctx, this.startX, this.startY, pos.x, pos.y, this.tool);
        } else if (this.tool === 'select') {
            this.selection = {
                x: Math.min(this.startX, pos.x), y: Math.min(this.startY, pos.y),
                w: Math.abs(pos.x - this.startX), h: Math.abs(pos.y - this.startY)
            };
            this.drawSelectionBox();
        }
    }

    onPointerUp(e) {
        if (!this.isDrawing || !this.activeDoc) return;
        this.isDrawing = false;

        if (this.isDraggingSelection && this.floatingSelection) {
            this.isDraggingSelection = false;
            this.commitFloatingSelection();
            return;
        }

        const layerCtx = this.activeDoc.ctx;
        const interCtx = this.interactionCtx;

        if (this.tool === 'pencil' || this.tool === 'brush' || this.tool === 'eraser') {
            layerCtx.globalCompositeOperation = 'source-over';
            layerCtx.drawImage(this.interactionCanvas, 0, 0);
            interCtx.clearRect(0, 0, this.activeDoc.width, this.activeDoc.height);
            this.render();
            this.activeDoc.saveState();
        } else if (this.tool === 'line' || this.tool === 'rect' || this.tool === 'ellipse') {
            layerCtx.globalCompositeOperation = 'source-over';
            const pos = this.getPos(e);
            this.drawShape(layerCtx, this.startX, this.startY, pos.x, pos.y, this.tool);
            interCtx.clearRect(0, 0, this.activeDoc.width, this.activeDoc.height);
            this.render();
            this.activeDoc.saveState();
        }
    }

    commitFloatingSelection() {
        if (!this.floatingSelection) return;
        const fs = this.floatingSelection;
        this.activeDoc.ctx.putImageData(fs.imgData, fs.x, fs.y);
        this.floatingSelection = null;
        this.selection = null;
        this.clearSelectionCanvas();
        this.render();
        this.activeDoc.saveState();
    }

    drawShape(ctx, x1, y1, x2, y2, type) {
        ctx.save();
        ctx.lineWidth = this.lineWidth;
        ctx.lineCap = 'round';
        const hasStroke = this.shapeOptions.stroke !== 'none';
        const hasFill = this.shapeOptions.fill === 'solid';
        
        // 【修复】如果既无轮廓又无填充，则强制使用前景色描边，防止画了没反应
        if (!hasStroke && !hasFill) {
            ctx.strokeStyle = this.fgColor;
            ctx.setLineDash([]);
            hasStroke = true; 
        }

        if (hasStroke) {
            ctx.strokeStyle = this.fgColor;
            ctx.setLineDash(this.shapeOptions.stroke === 'dashed' ? [5, 5] : []);
        }
        if (hasFill) ctx.fillStyle = this.bgColor;

        ctx.beginPath();
        if (type === 'line') {
            ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
            if (hasStroke) ctx.stroke();
        } else if (type === 'rect') {
            if (hasFill) ctx.fillRect(x1, y1, x2 - x1, y2 - y1);
            if (hasStroke) ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);
        } else if (type === 'ellipse') {
            ctx.ellipse((x1+x2)/2, (y1+y2)/2, Math.abs(x2-x1)/2 || 1, Math.abs(y2-y1)/2 || 1, 0, 0, Math.PI*2);
            if (hasFill) ctx.fill();
            if (hasStroke) ctx.stroke();
        }
        ctx.restore();
    }

    drawSelectionBox() {
        this.clearSelectionCanvas();
        if (!this.selection) return;
        const {x, y, w, h} = this.selection;
        this.selectionCtx.strokeStyle = '#0067c0';
        this.selectionCtx.lineWidth = 1;
        this.selectionCtx.setLineDash([4, 4]);
        this.selectionCtx.strokeRect(x, y, w, h);
        this.selectionCtx.setLineDash([]);
    }
    
    clearSelectionCanvas() {
        if(this.activeDoc) this.selectionCtx.clearRect(0, 0, this.activeDoc.width, this.activeDoc.height);
    }

    floodFill(ctx, startX, startY, fillColor) {
        if(startX < 0 || startX >= this.activeDoc.width || startY < 0 || startY >= this.activeDoc.height) return;
        const imageData = ctx.getImageData(0, 0, this.activeDoc.width, this.activeDoc.height);
        const data = imageData.data;
        const w = this.activeDoc.width;
        const h = this.activeDoc.height;

        // 【修复】使用 let 而不是 const，因为后面需要修改这些变量
        let targetR, targetG, targetB, targetA;
        const hexToRgb = (hex) => {
            const r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16);
            return [r, g, b, 255];
        };

        const [r, g, b, a] = hexToRgb(fillColor);
        targetR = r; targetG = g; targetB = b; targetA = a;

        const startIdx = (startY * w + startX) * 4;
        const startColor = [data[startIdx], data[startIdx+1], data[startIdx+2], data[startIdx+3]];

        if (this.colorsMatch(startColor, [targetR, targetG, targetB, targetA])) return;

        const stack = [[startX, startY]];
        const visited = new Uint8Array(w * h);

        while (stack.length > 0) {
            const [x, y] = stack.pop();
            if (x < 0 || x >= w || y < 0 || y >= h) continue;
            const idx = y * w + x;
            if (visited[idx]) continue;

            const pIdx = idx * 4;
            const currentColor = [data[pIdx], data[pIdx+1], data[pIdx+2], data[pIdx+3]];
            if (!this.colorsMatch(currentColor, startColor)) continue;

            visited[idx] = 1;
            data[pIdx] = targetR; data[pIdx+1] = targetG;
            data[pIdx+2] = targetB; data[pIdx+3] = targetA;

            stack.push([x+1, y], [x-1, y], [x, y+1], [x, y-1]);
        }
        ctx.putImageData(imageData, 0, 0);
    }

    colorsMatch(c1, c2) {
        return Math.abs(c1[0]-c2[0]) < 15 && Math.abs(c1[1]-c2[1]) < 15 && Math.abs(c1[2]-c2[2]) < 15 && Math.abs(c1[3]-c2[3]) < 15;
    }

    pickColor(x, y) {
        if(!this.activeDoc || x<0 || y<0 || x>=this.activeDoc.width || y>=this.activeDoc.height) return;
        const pixel = this.activeDoc.ctx.getImageData(x, y, 1, 1).data;
        const hex = '#' + [pixel[0], pixel[1], pixel[2]].map(v => v.toString(16).padStart(2, '0')).join('');
        this.setFgColor(hex);
    }

    showTextInput(x, y) {
        this.textInput.style.left = (x * this.zoom) + 'px';
        this.textInput.style.top = (y * this.zoom) + 'px';
        this.textInput.style.display = 'block';
        this.textInput.style.fontSize = (this.fontSize * this.zoom) + 'px';
        this.textInput.style.color = this.fgColor;
        this.textInput.focus();
        this.textStartX = x; this.textStartY = y;
    }

    commitText() {
        const text = this.textInput.value;
        if (text && this.activeDoc) {
            const ctx = this.activeDoc.ctx;
            ctx.font = `${this.fontSize}px "Segoe UI", sans-serif`;
            ctx.fillStyle = this.fgColor;
            ctx.textBaseline = 'top';
            text.split('\n').forEach((line, i) => {
                ctx.fillText(line, this.textStartX, this.textStartY + i * (this.fontSize + 4));
            });
            this.render();
            this.activeDoc.saveState();
        }
        this.textInput.value = '';
        this.textInput.style.display = 'none';
    }

    setTool(tool) {
        if (this.floatingSelection) this.commitFloatingSelection();
        this.tool = tool;
        document.querySelectorAll('.btn[data-tool]').forEach(b => b.classList.remove('active'));
        const btn = document.querySelector(`.btn[data-tool="${tool}"]`);
        if (btn) btn.classList.add('active');
        
        this.interactionCanvas.style.cursor = 
            tool === 'picker' ? 'crosshair' : 
            tool === 'bucket' ? 'cell' : 
            tool === 'text' ? 'text' : 
            tool === 'select' ? 'crosshair' : 'crosshair';
            
        if (tool !== 'select') {
            this.selection = null;
            this.clearSelectionCanvas();
        }
    }

    setFgColor(c) { this.fgColor = c; document.getElementById('fgColor').value = c; document.getElementById('fgColorBox').style.background = c; }
    setBgColor(c) { this.bgColor = c; document.getElementById('bgColor').value = c; document.getElementById('bgColorBox').style.background = c; }
    setLineWidth(v) { this.lineWidth = parseInt(v); document.getElementById('sizeVal').textContent = v; }
    setFontSize(v) { this.fontSize = parseInt(v); document.getElementById('fontVal').textContent = v; }
    updateShapeOptions() {
        this.shapeOptions.stroke = document.getElementById('strokeStyle').value;
        this.shapeOptions.fill = document.getElementById('fillStyle').value;
    }

    setZoom(val) {
        this.zoom = val / 100;
        this.syncCanvasSize();
        document.getElementById('zoomVal').textContent = val + '%';
    }
    zoomIn() { const z = Math.min(800, parseInt(document.getElementById('zoomSlider').value) + 20); document.getElementById('zoomSlider').value = z; this.setZoom(z); }
    zoomOut() { const z = Math.max(10, parseInt(document.getElementById('zoomSlider').value) - 20); document.getElementById('zoomSlider').value = z; this.setZoom(z); }

    undo() { if(this.activeDoc && this.activeDoc.undo()) { this.selection = null; this.clearSelectionCanvas(); } }
    redo() { if(this.activeDoc && this.activeDoc.redo()) { this.selection = null; this.clearSelectionCanvas(); } }

    rotate(deg) {
        if(!this.activeDoc) return;
        const doc = this.activeDoc;
        const temp = document.createElement('canvas');
        const tCtx = temp.getContext('2d');
        if (deg === 90 || deg === 270) { temp.width = doc.height; temp.height = doc.width; }
        else { temp.width = doc.width; temp.height = doc.height; }
        
        tCtx.translate(temp.width/2, temp.height/2);
        tCtx.rotate(deg * Math.PI / 180);
        tCtx.drawImage(doc.canvas, -doc.width/2, -doc.height/2);
        
        doc.canvas.width = temp.width; doc.canvas.height = temp.height;
        doc.width = temp.width; doc.height = temp.height;
        doc.ctx.drawImage(temp, 0, 0);
        
        this.syncCanvasSize(); this.render(); doc.saveState();
    }

    showResizeModal() {
        if(!this.activeDoc) return;
        document.getElementById('resizeW').value = this.activeDoc.width;
        document.getElementById('resizeH').value = this.activeDoc.height;
        document.getElementById('resizeModal').classList.add('show');
    }
    hideModal(id) { document.getElementById(id).classList.remove('show'); }
    applyResize() {
        const newW = parseInt(document.getElementById('resizeW').value);
        const newH = parseInt(document.getElementById('resizeH').value);
        if (!newW || !newH || !this.activeDoc) return;
        
        const doc = this.activeDoc;
        const temp = document.createElement('canvas');
        temp.width = newW; temp.height = newH;
        temp.getContext('2d').drawImage(doc.canvas, 0, 0, newW, newH);
        
        doc.canvas.width = newW; doc.canvas.height = newH;
        doc.width = newW; doc.height = newH;
        doc.ctx.drawImage(temp, 0, 0);
        
        this.syncCanvasSize(); this.render(); doc.saveState();
        this.hideModal('resizeModal');
    }

    cropToSelection() {
        if (!this.selection || !this.activeDoc) return alert('请先用"选择"工具框选一个区域！');
        const {x, y, w, h} = this.selection;
        const doc = this.activeDoc;
        const imgData = doc.ctx.getImageData(x, y, w, h);
        doc.canvas.width = w; doc.canvas.height = h;
        doc.width = w; doc.height = h;
        doc.ctx.putImageData(imgData, 0, 0);
        
        this.selection = null; this.clearSelectionCanvas();
        this.syncCanvasSize(); this.render(); doc.saveState();
    }

    deleteSelection() {
        if (!this.selection || !this.activeDoc) return;
        const {x, y, w, h} = this.selection;
        // 【修复】使用背景色填充，而不是 clearRect，确保不透明
        this.activeDoc.ctx.fillStyle = this.bgColor;
        this.activeDoc.ctx.fillRect(x, y, w, h);
        this.render();
        this.activeDoc.saveState();
    }

    copySelection() {
        if (!this.selection || !this.activeDoc) return;
        const {x, y, w, h} = this.selection;
        this.clipboard = {
            imgData: this.activeDoc.ctx.getImageData(x, y, w, h),
            w: w, h: h
        };
    }

    pasteClipboard() {
        if (!this.clipboard || !this.activeDoc) return;
        // 粘贴时，直接创建一个浮动选区，方便用户拖拽移动
        this.floatingSelection = {
            imgData: this.clipboard.imgData,
            x: 0, y: 0, // 默认粘贴到左上角
            w: this.clipboard.w, h: this.clipboard.h
        };
        this.selection = { x: 0, y: 0, w: this.clipboard.w, h: this.clipboard.h };
        this.setTool('select'); // 自动切换到选择工具以便拖拽
        this.render();
    }
}

const app = new PaintApp();
window.app = app;

document.getElementById('resizeW').addEventListener('input', function() {
    if (document.getElementById('keepRatio').checked && app.activeDoc) {
        const ratio = app.activeDoc.height / app.activeDoc.width;
        document.getElementById('resizeH').value = Math.round(this.value * ratio);
    }
});
</script>
</body>
